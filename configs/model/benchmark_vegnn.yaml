name: benchmark_vegnn
use_backbone_dropout: true
backbone_dropout: 0.1
builder: spectra.models.ehc:build_ehc_egnn
solute_node_in: 12
solute_edge_in: 4
egnn_hidden: 128
egnn_layers: 6
egnn_cutoff: 5.0
solvent_node_in: 14
solvent_edge_in: 7
z_dim: 128
solvent_layers: 3
film_layers: [6]
film_beta_only: false
film_scale: 0.3
head_hidden: 256
energy_space: false
egnn_use_edge_film: true

# Updated EGNN (MGIL Full)
use_moments: true
use_global: true
use_virtual_node: true
mgil_use_nonlocal: false
mgil_nonlocal_heads: 4
mgil_nonlocal_features: 64
mgil_nonlocal_dropout: 0.0
mgil_nonlocal_scale: 1.0

optimizer:
  type: adamw
  lr: 5.0e-4
  weight_decay: 1.0e-5
  betas: [0.9, 0.999]
  eps: 1.0e-8
scheduler:
  type: cosine
  warmup_epochs: 20
  warmup_start_factor: 0.01
  t_max: 200
  eta_min: 5.0e-5
loss:
  type: mse
trainer:
  epochs: 200
  output_dir: checkpoints/benchmark
  seed: 42
  amp: true
  precision: bf16
  device: cuda
  allow_tf32: true
  cudnn_benchmark: true
  grad_clip_norm: 1.0
  accumulate_steps: 1
  val_every: 1
  log_every_steps: 50
  early_stop:
    enabled: false
    patience: 15
    min_delta: 0.0
    mode: min
loader:
  batch_size: 64
  num_workers: 8
